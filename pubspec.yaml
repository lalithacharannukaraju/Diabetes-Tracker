name: diabetes_tracker
description: A Flutter app to track diabetes medication and diet
publish_to: 'none'
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  table_calendar: ^3.0.8
  provider: ^6.0.5
  http: ^1.2.0
  shared_preferences: ^2.0.18
  flutter_local_notifications: ^18.0.1
  timezone: ^0.10.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
